# ===== Living =====
living_room_lighting_automation:
  module: presence_controller
  class: PresenceLightController
  presence_sensors:
    - binary_sensor.living_m1_presence
  target_entities:
    - light.living_l2_1
    - light.living_l2_2
    - light.living_l2_3
    - light.living_l2_4
    - light.living_l1_1
    - light.living_l1_2
    - light.living_l1_3
    - light.living_l1_4
  lux_sensor: sensor.living_m1_illuminance
  lux_threshold: 100
  home_mode_entity: input_select.home_mode
  base_turn_off_delay: 60
  comfort_mode_delay: 360

living_manual_mode:
  module: manual_controller
  class: ManualModeController
  switches:
    - switch.living_s1_l1
    - switch.living_s1_l2
    - switch.living_s2_l3
    - switch.living_s2_l4
  manual_boolean: input_boolean.living_manualmode_on
  default_duration: 600
  sync_switch: switch.living_m1_find_switch

# ===== Room3 =====
room3_lighting_automation:
  module: presence_controller
  class: PresenceLightController
  presence_sensors:
    - binary_sensor.room3_m1_radar_target
    - binary_sensor.room3_m2_radar_target
  target_entities:
    - light.room3_l1_1
    - light.room3_l1_2
    - light.room3_l2_1
    - light.room3_l2_2
  manual_mode: input_boolean.room3_manualmode_on
  sleep_mode: input_boolean.room3_sleepmode_on
  base_turn_off_delay: 90

room3_manual_mode:
  module: manual_controller
  class: ManualModeController
  switches:
    - switch.room3_s1_l1
    - switch.room3_s1_l2
  manual_boolean: input_boolean.room3_manualmode_on
  default_duration: 1800
  night_duration: 600
  night_start_hour: 23
  night_end_hour: 7
  reset_sensor: binary_sensor.room3_m1_radar_target
  reset_sensor_delay: 300

room3_sleep_mode:
  module: room_mode_controller
  class: SleepModeController
  sleep_boolean: input_boolean.room3_sleepmode_on
  wakeup_time_entity: input_datetime.room3_sleepmode_off
  lights:
    - light.room3_l1_1
    - light.room3_l1_2
    - light.room3_l2_1
    - light.room3_l2_2
  manual_mode_boolean: input_boolean.room3_manualmode_on
  media_player: media_player.google_home_mini
  notify_target: mobile_app_beoms_phone
  weather_entity: weather.forecast_home

# ===== Room2 =====
room2_lighting_automation:
  module: presence_controller
  class: PresenceLightController
  presence_sensors:
    - binary_sensor.room2_m1_presence
  target_entities:
    - switch.room2_s1_l2
  base_turn_off_delay: 30

